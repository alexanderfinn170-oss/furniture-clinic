<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furniture Clinic</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
text-align:center;
}

/* logo banner */

.logo-banner{
width:100%;
}

.logo-banner img{
width:100%;
height:auto;
display:block;
}

/* company name */

.company-name{

font-size:12vw;
font-weight:bold;
margin-top:10px;
line-height:1;

-webkit-text-stroke:2px black;

background:linear-gradient(
90deg,
red,
orange,
yellow,
green,
blue,
purple,
red
);

background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:colorMove 6s linear infinite;

}

@keyframes colorMove{

0%{background-position:0%}

100%{background-position:400%}

}

/* phone number */

.phone{

font-size:6vw;
color:#2c7a2c;
font-weight:bold;
margin-top:2px;

}

</style>
</head>

<body>

<!-- LOGO BANNER -->

<div class="logo-banner">

<img src="logo.png" alt="Furniture Clinic">

</div>

<!-- COMPANY NAME -->

<div class="company-name">
মোবাইল ক্লিনিক
</div>

<!-- PHONE -->

<div class="phone">
01785369906
</div>

</body>
</html>
